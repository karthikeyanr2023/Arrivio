<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrivio Login</title>
  <style>
    :root {
      --primary: #1b3f72;
      --accent: #4db5ff;
      --surface: #ffffff;
      --surface-strong: #f8fbff;
      --text: #12233b;
      --muted: #5b6b86;
      --shadow: 0 28px 70px rgba(22, 48, 89, 0.12);
      --border: rgba(57, 110, 187, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(77, 181, 255, 0.18), transparent 25%),
                  radial-gradient(circle at bottom right, rgba(27, 63, 114, 0.16), transparent 22%),
                  linear-gradient(180deg, #eef6ff 0%, #f8fbff 54%, #f4f8ff 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 36px 16px;
    }

    .page-shell {
      width: min(520px, 100%);
      position: relative;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(241,247,255,0.95));
      border: 1px solid rgba(255,255,255,0.9);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(77, 181, 255, 0.18), transparent 24%),
                  radial-gradient(circle at bottom left, rgba(27, 63, 114, 0.14), transparent 18%);
      pointer-events: none;
    }

    .hero-header {
      position: relative;
      padding: 44px 32px 28px;
      text-align: center;
      z-index: 1;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(77, 181, 255, 0.14);
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 18px;
      border: 1px solid rgba(77, 181, 255, 0.22);
    }

    .brand-chip span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(77, 181, 255, 0.08);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.7rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .hero-description {
      margin: 16px auto 0;
      max-width: 360px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .login-panel {
      position: relative;
      padding: 32px;
      background: var(--surface);
      border-top: 1px solid rgba(24, 81, 153, 0.06);
      z-index: 1;
    }

    .form-row {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .form-row label {
      display: block;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-row input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fbff;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
    }

    .form-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(77, 181, 255, 0.12);
    }

    .login-action {
      display: grid;
      gap: 14px;
      margin-top: 4px;
    }

    .login-action button {
      padding: 16px 18px;
      border: none;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-action button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 32px rgba(14, 86, 170, 0.18);
    }

    .login-action .secondary-link {
      text-align: center;
      color: var(--primary);
      font-size: 0.95rem;
      text-decoration: none;
      font-weight: 600;
    }

    .login-action .secondary-link span {
      color: var(--accent);
    }

    .login-action .secondary-link:hover {
      text-decoration: underline;
    }

    .help-text {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .message {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      .hero-card {
        border-radius: 28px;
      }

      .hero-header {
        padding: 32px 24px 24px;
      }

      .login-panel {
        padding: 28px 24px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero-card">
      <div class="hero-header">
        <div class="brand-chip">
          <span></span>
          Arrivio Secure
        </div>
        <h1 class="hero-title">Sign in to Arrivio</h1>
        <p class="hero-description">Access your dashboard, manage projects, and keep your team connected with a secure login experience.</p>
      </div>

      <div class="login-panel">
        <div class="message" id="message"></div>

        <form id="loginForm" autocomplete="off">
          <div class="form-row">
            <label for="username">User Name</label>
            <input type="text" id="username" name="username" placeholder="Enter your user name" autocomplete="username" />
          </div>

          <div class="form-row">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>

          <div class="login-action">
            <button type="submit">Login</button>
<a class="secondary-link" href="/Arrivio/Arrivio/New_User_Reg.html">Create Profile <span>&rarr;</span></a>
          </div>
        </form>

        <p class="help-text">Need help? Make sure your username and password are correct, or create a new profile to get started.</p>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const messageBox = document.getElementById('message');

    form.addEventListener('submit', event => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showMessage('Please enter both user name and password.', true);
        return;
      }

      showMessage('Login submitted. Redirecting...', false);
      setTimeout(() => {
        window.location.href = 'ProjectwinsPage1.html';
      }, 900);
    });

    function showMessage(text, isError) {
      messageBox.textContent = text;
      messageBox.style.display = 'block';
      messageBox.style.background = isError ? '#fdecea' : '#e3f2ff';
      messageBox.style.color = isError ? '#9a1b0b' : '#0a3f61';
    }
  </script>
</body>
</html>
