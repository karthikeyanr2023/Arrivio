<!DOCTYPE html>
<html>
<head>
<style>
    table, th, td {
  border:1px solid black;
}
body {
  font-family: Arial, Helvetica, sans-serif;
}

* {
  box-sizing: border-box;
}

/* style the container */
.container {
  position: relative;
  border-radius: 5px;
  background-color: #f2f2f2;
  padding: 20px 0 30px 0;
}

/* style inputs and link buttons */
input,
.btn {
  width: 60%;
  padding: 12px;
  border: none;
  border-radius: 4px;
  margin: 5px 0;
  opacity: 0.85;
  display: inline-block;
  font-size: 17px;
  line-height: 20px;
  text-decoration: none; /* remove underline from anchors */
}

input:hover,
.btn:hover {
  opacity: 1;
}

/* style the submit button */
input[type=submit] {
  background-color: #04AA6D;
  color: white;
  cursor: pointer;
}

input[type=submit]:hover {
  background-color: #45a049;
}

/* Two-column layout */
.col {
  float: left;
  width: 50%;
  margin: auto;
  padding: 0 50px;
  margin-top: 6px;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* vertical line */
.vl {
  position: absolute;
  left: 50%;
  transform: translate(-50%);
  border: 2px solid #ddd;
  height: 175px;
}

/* text inside the vertical line */
.vl-innertext {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  background-color: #f1f1f1;
  border: 1px solid #ccc;
  border-radius: 50%;
  padding: 8px 10px;
}

/* hide some text on medium and large screens */
.hide-md-lg {
  display: none;
}

/* bottom container */
.bottom-container {
  text-align: center;
  background-color: #666;
  border-radius: 0px 0px 4px 4px;
}

/* Responsive layout - when the screen is less than 650px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 650px) {
  .col {
    width: 50%;
    margin-top: 0;
  }
  /* hide the vertical line */
  .vl {
    display: none;
  }
  /* show the hidden text on small screens */
  .hide-md-lg {
    display: block;
    text-align: center;
  }
}
</style>
      <script>
        var callsigninAPI = (signup_username,signin_passwd)=>{
            // instantiate a headers object
            var myHeaders = new Headers();
            // add content type header to object
           myHeaders.append("Content-Type", "application/json");
            // using built in JSON utility package turn object to string and store in a variable
            var raw = JSON.stringify({"signup_username":signup_username,"signin_passwd":signin_passwd});
            //console.log(raw);
            // create a JSON object with parameters for API call and store in a variable
            var requestOptions = {
                method: 'POST',
                headers: myHeaders,
                body: raw,
                redirect: 'follow'
            };
            console.log("Raw Request Data:", raw);
            fetch("https://f9ftxg5q33.execute-api.us-west-1.amazonaws.com/Dev", requestOptions)
            .then(response => {
            if (response.ok) {
                return response.text();
            } else {
                throw new Error('Failed to fetch data');
            }
            }).then(responseText => {
            // Parse the JSON string
            const responseObject = JSON.parse(responseText);

            // Access the statusCode property
            const statusCode = responseObject.statusCode;
            // Now you can use the statusCode variable as needed
            console.log(statusCode);
            // Apply your conditional statement
            if (statusCode == 201)
            {
                console.log('Password match not found!');
                const userConfirmed = window.confirm('Incorrect Password');
                setTimeout(() => {
                    console.log('Status code is 201');
                }, 2000);
                window.location.href = 'https://main.d2bpbvhfbls5o6.amplifyapp.com/ProjectwinsPage1.html'
            }
            if (statusCode == 202)
            {
                console.log('Username not found!');
                const userConfirmed = window.confirm('Username not found');
                setTimeout(() => { console.log('Status code is 202'); }, 2000);
                window.location.href = 'https://main.d2bpbvhfbls5o6.amplifyapp.com/ProjectwinsPage1.html'
            }

            if (statusCode == 200)
            {
                //console.log('Status code is 200');
                // const userConfirmed = window.confirm('Login Success');
                setTimeout(() => { console.log('Status code is 200'); }, 2000);
                window.location.href = 'https://www.google.com'
            }

            else{
                 setTimeout(() => { console.log('Status code is .....'); }, 2000);
             }
        }) .catch(error => {
            console.error(error);
        });

            // .then(result => alert(JSON.parse(result).body))
            // .catch(error => console.log('error', error));
        }

    </script>

</head>
<body>

<h2 style="text-align:center">Welcome to Riders World</h2>
<p style="text-align:center">Connect with your Rider Friends</p>

<div class="container">
    <div class="row">
      <h2 style="text-align:center">Login Manually or Register as New user</h2>
      <div class="vl">
      </div>
      <div class="col">
                  <table style="width:80%">
                <td height=300>
                </table>
      </div>

      <div class="col">
        <div class="hide-md-lg">
          <p>Or sign in manually:</p>
        </div>
          <div class="container">
        <form method="POST" action="https://f9ftxg5q33.execute-api.us-west-1.amazonaws.com/Dev">
        <input type="text" name="signup_username" placeholder="Username" required id="signup_username">
        <input type="password" name="signin_passwd" placeholder="Password" required id="signin_passwd">
             </form>
              <input type="submit" onclick="callsigninAPI(document.getElementById('signup_username').value,document.getElementById('signin_passwd').value)" value="Login">

    </div>
</div>


<div class="bottom-container">
  <div class="row">
    <div class="col">
      <a href="https://main.d2bpbvhfbls5o6.amplifyapp.com/ProjectwinsPages2.html" style="color:white" class="btn">Sign up</a>

</body>
</html>
