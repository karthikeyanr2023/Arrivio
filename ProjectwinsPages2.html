<!DOCTYPE html>
<html>
<head>

<style>
    table, th, td {
  border:1px solid black;
}
body {
  font-family: Arial, Helvetica, sans-serif;
}

* {
  box-sizing: border-box;
}

/* style the container */
.container {
  position: relative;
  border-radius: 5px;
  background-color: #f6f6f6;
  padding: 20px 0 30px 0;
}

/* style inputs and link buttons */
input,
.btn {
  width: 50%;
  padding: 12px;
  border: none;
  border-radius: 4px;
  margin: 5px 0;
  opacity: 0.85;
  display: inline-block;
  font-size: 17px;
  line-height: 20px;
  text-decoration: none; /* remove underline from anchors */
}

input:hover,
.btn:hover {
  opacity: 1;
}

/* style the submit button */
input[type=submit] {
  background-color: #04AA6D;
  color: white;
  cursor: pointer;
}

/* vertical line */
.vl {
  position: absolute;
  left: 50%;
  transform: translate(-50%);
  border: 2px solid #ddd;
  height: 175px;
}

</style>
    <script>
        // callAPI function that takes the base and exponent numbers as parameters
        var callAPI = (signup_username,signup_mailid,signup_passwd,signup_family,signup_dob,signup_country)=>{
            // instantiate a headers object
            var myHeaders = new Headers();
            // add content type header to object
            myHeaders.append("Content-Type", "application/json");
            // using built in JSON utility package turn object to string and store in a variable
            var raw = JSON.stringify({"signup_username":signup_username,"signup_mailid":signup_mailid,"signup_passwd":signup_passwd,"signup_family":signup_family,"signup_dob":signup_dob,"signup_country":signup_country});
            // create a JSON object with parameters for API call and store in a variable
            var requestOptions = {
                method: 'POST',
                headers: myHeaders,
                body: raw,
                redirect: 'follow'
            };
            // make API call with parameters and use promises to get response
            fetch("https://2rf5n13uaa.execute-api.us-west-1.amazonaws.com/Dev", requestOptions)
            .then(response => response.text());
            //.then(result => alert(JSON.parse(result).body));
            //.catch(error => console.log('error', error));
        }
    </script>

     <script>
         const apiEndpoint = 'https://2rf5n13uaa.execute-api.us-west-1.amazonaws.com/Dev';

            fetch(apiEndpoint).then(response => response.json()).then(data => {
            const notificationMessage = data.message;
            document.write(notificationMessage)
            // Display the notification message as a popup or alert
            alert(notificationMessage);
            })
        .catch(error => console.error("Error:", error));
     </script>

</head>
<body>

<h2 style="text-align:center">Welcome to Hello World Sign up</h2>
<p style="text-align:center">Join  your friends</p>

<div class="container">
        <form method="POST" action="https://2rf5n13uaa.execute-api.us-west-1.amazonaws.com/Dev">
        <input type="text" name="signup_username" placeholder="Name" required id="signup_username">
            <input type="text" name="signup_mailid" placeholder="E-mail" required id="signup_mailid">
            <input type="password" name="signup_passwd" placeholder="Password" required id="signup_passwd">
        <input type="text" name="signup_family" placeholder="Family" required id="signup_family">
        <input type="text" name="signup_dob" placeholder="DOB" required id="signup_dob">
        <input type="text" name="signup_country" placeholder="Country" required id="signup_country">
        </form>
       <input type="submit" onclick= "callAPI(document.getElementById('signup_username').value,document.getElementById('signup_mailid').value,document.getElementById('signup_passwd').value,document.getElementById('signup_family').value,getElementById('signup_dob').value,getElementById('signup_country').value);location.href='https://dev.dlk5jzti6d0y7.amplifyapp.com/Signupresponse.html'" value="Join us">
