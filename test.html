<!DOCTYPE html>
<html>
<head>
    <title>DynamoDB Entry</title>
</head>
<body>
    <h1>Add an Entry to DynamoDB</h1>
    <form id="entryForm">
        <input type="text" name="entry" placeholder="Entry" required>
        <button type="submit">Add Entry</button>
    </form>
    <div id="message"></div>
    <script>
        document.getElementById("signup_username").addEventListener("submit", function (e) {
            e.preventDefault();
            const entry = e.target.entry.value;

            // Make an API request to your API Gateway
            fetch('https://2rf5n13uaa.execute-api.us-west-1.amazonaws.com/Dev', {
                method: 'POST',
                body: JSON.stringify({ entry: entry })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("message").innerText = data.message;
            })
            .catch(error => console.error("Error:", error));
        });
    </script>
</body>
</html>
